<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="DRIVE（走）— 低ポリの島をミニカーで自由に走り回る3Dワールド。Three.js + Rapier物理エンジン。坂でジャンプ、クレートを蹴散らし、コインを集めよう。" />
  <meta name="theme-color" content="#3f86d4" />
  <meta property="og:title" content="DRIVE — 走" />
  <meta property="og:description" content="低ポリの島をミニカーで走り回る3Dワールド。" />
  <meta property="og:type" content="website" />
  <title>DRIVE — 走</title>
</head>
<body>
  <canvas id="scene"></canvas>

  <div id="loading"><span>LOADING</span><small>島を読み込み中…</small></div>

  <header class="brand">
    <span class="brand-en">DRIVE</span>
    <span class="brand-jp">走</span>
  </header>

  <div class="hud">
    <div class="stat"><span class="ic">◎</span><b id="coins">0</b><span class="sep">/</span><span id="coins-total">0</span></div>
    <div class="stat"><b id="speed">0</b><span class="unit">km/h</span></div>
  </div>

  <div class="help">
    <kbd>W A S D</kbd> / <kbd>↑ ↓ ← →</kbd> 運転 ・ <kbd>Space</kbd> ブレーキ ・ <kbd>R</kbd> リセット
  </div>

  <!-- touch controls -->
  <div class="touch">
    <button id="btn-left" aria-label="left">◀</button>
    <div class="touch-col">
      <button id="btn-up" aria-label="forward">▲</button>
      <button id="btn-down" aria-label="back">▼</button>
    </div>
    <button id="btn-right" aria-label="right">▶</button>
  </div>

  <footer class="credit">Three.js · Rapier — <a href="https://github.com/masafykun" target="_blank" rel="noopener">masafy</a></footer>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
